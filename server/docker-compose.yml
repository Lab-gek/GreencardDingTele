# docker-compose.yml — Full LoRa Telemetry Server Stack
#
# Services:  InfluxDB 2.x  +  Grafana  +  Ingest bridge (serial → InfluxDB)
#
# Usage:
#   cd server
#   docker compose up -d
#
# Grafana:  http://localhost:3000  (admin / admin)
# InfluxDB: http://localhost:8086  (admin / adminpassword)
#
# Note: The ingest service needs access to the gateway's serial port.
#       Adjust the device path in the "devices" section below if needed.

services:
  influxdb:
    image: influxdb:2.7
    container_name: telemetry-influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: adminpassword
      DOCKER_INFLUXDB_INIT_ORG: telemetry
      DOCKER_INFLUXDB_INIT_BUCKET: telemetry
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: telemetry-super-secret-token
    volumes:
      - influxdb-data:/var/lib/influxdb2

  grafana:
    image: grafana/grafana:10.4.0
    container_name: telemetry-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - influxdb

  ingest:
    build: .
    container_name: telemetry-ingest
    restart: unless-stopped
    devices:
      - "/dev/ttyUSB0:/dev/ttyUSB0"
    depends_on:
      - influxdb

volumes:
  influxdb-data:
  grafana-data:
